# ============================================================================
# Fileninja — Nginx reverse proxy
# Deploy to: /etc/nginx/sites-available/fileninja
# Symlink:   /etc/nginx/sites-enabled/fileninja
# ============================================================================

# HTTP → HTTPS redirect (Certbot replaces this once SSL is issued).
server {
    listen 80;
    listen [::]:80;
    server_name fileninja.cloud www.fileninja.cloud 85.215.225.0;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://fileninja.cloud$request_uri;
    }
}

# HTTPS — proxy to Next.js on :3005
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fileninja.cloud www.fileninja.cloud;

    # These paths are created/maintained by certbot:
    ssl_certificate     /etc/letsencrypt/live/fileninja.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fileninja.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Large uploads (adjust to your plan — Pro is unlimited file size)
    client_max_body_size 0;
    client_body_timeout  3600s;
    proxy_read_timeout   3600s;
    proxy_send_timeout   3600s;
    send_timeout         3600s;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1024;

    # Stripe webhook: forward raw body (no buffering, exact bytes)
    location = /api/stripe/webhook {
        proxy_pass                  http://127.0.0.1:3005;
        proxy_http_version          1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering         off;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Main app proxy
    location / {
        proxy_pass                  http://127.0.0.1:3005;
        proxy_http_version          1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
